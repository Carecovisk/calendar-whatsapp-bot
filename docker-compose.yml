version: "3.9"

services:
  calendar-bot:
    build: .
    container_name: calendar-whatsapp-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Persist WhatsApp session across restarts (avoids re-scanning QR)
      - ./auth_info:/app/auth_info
      # Google Service Account credentials
      - ./credentials.json:/app/credentials.json:ro
    environment:
      - TZ=${TZ:-America/Sao_Paulo}
    # Show logs with color in docker compose logs
    tty: true
